version: '3.8'
services:
  swxy_api:
    build:
      context: ./app
      dockerfile: Dockerfile
    hostname: swxy_api
    container_name: swxy_api
    environment:
      - HF_ENDPOINT=https://hf-mirror.com
      - DATABASE_URL=postgresql://postgres:pg123456@gsk_pg:5432/gsk
      - ES_HOST=http://es01:9200
      - ROOT_PATH=http://localhost:8000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./nltk_data:/usr/local/nltk_data
    # 16C64G：4 个 worker 充分利用多核，每个 worker 独立处理 OCR/对话请求
    command: ["uvicorn", "app_main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "4"]
    restart: unless-stopped
    # 16C64G：单次 OCR 解析峰值约 2-4GB，4 workers 并发上限给 16GB
    mem_limit: 16g
    depends_on:
      - gsk_pg
      - es01
      - redis
    networks:
      - gsk_network

  es01:
    container_name: gsk-es-01
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.3
    volumes:
      - gsk_esdata01:/usr/share/elasticsearch/data
    env_file: .env
    environment:
      - node.name=es01
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - bootstrap.memory_lock=false
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      # 16C64G 数据盘 200GB：water mark 放宽
      - cluster.routing.allocation.disk.watermark.low=20gb
      - cluster.routing.allocation.disk.watermark.high=10gb
      - cluster.routing.allocation.disk.watermark.flood_stage=5gb
      - TZ=${TIMEZONE}
      # 16C64G：heap 4GB（ES 推荐不超过 32GB，4GB 对 RAG 检索已绰绰有余）
      - "ES_JAVA_OPTS=-Xms4g -Xmx4g"
    # MEM_LIMIT 改为 8GB，见 .env
    mem_limit: ${MEM_LIMIT}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: ["CMD-SHELL", "curl http://localhost:9200"]
      interval: 10s
      timeout: 10s
      retries: 120
    restart: on-failure
    networks:
      - gsk_network

  gsk_pg:
    container_name: gsk_pg
    image: postgres:15-alpine
    environment:
      - POSTGRES_PASSWORD=pg123456
      - POSTGRES_USER=postgres
      - POSTGRES_DB=gsk
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    # 16C64G：给 PG 2GB，足以应对大量会话/消息记录
    mem_limit: 2g
    networks:
      - gsk_network

  redis:
    container_name: gsk_redis
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    # 16C64G：缓存上限 1GB，LRU 淘汰
    command: ["redis-server", "--maxmemory", "1gb", "--maxmemory-policy", "allkeys-lru"]
    mem_limit: 1536m
    restart: unless-stopped
    networks:
      - gsk_network


volumes:
  gsk_esdata01:
    driver: local
  pg_data:
    driver: local
  redis_data:
    driver: local

networks:
  gsk_network:
    driver: bridge
